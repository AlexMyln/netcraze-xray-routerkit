name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up primary Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Shell syntax
        run: |
          sh -n scripts/install-xray-direct.sh
          sh -n scripts/healthcheck.sh
          sh -n scripts/backup.sh
          sh -n scripts/preflight.sh
          sh -n scripts/probe-device-discovery-readonly.sh
          sh -n templates/S23xray-direct

      - name: Python syntax
        run: |
          python3 -m py_compile scripts/routerkit_private_io.py
          python3 -m py_compile scripts/routerkit_profile_network.py
          python3 -m py_compile scripts/routerkit_profile_source.py
          python3 -m py_compile scripts/routerkit-profile-source.py
          python3 -m py_compile scripts/generate-xray-profiles.py
          python3 -m py_compile scripts/routerkit-wizard.py
          python3 -m py_compile scripts/routerkit-plan.py
          python3 -m py_compile scripts/routerkit-bootstrap.py
          python3 -m py_compile scripts/routerkit_artifact_network.py
          python3 -m py_compile scripts/routerkit_bootstrap_apply.py
          python3 -m py_compile scripts/routerkit.py
          python3 -m py_compile scripts/routerkit-autostart.py
          python3 -m py_compile scripts/routerkit_autostart.py
          python3 -m py_compile scripts/routerkit_devices.py
          python3 -m py_compile scripts/routerkit-devices.py

      - name: Focused device discovery tests
        run: |
          python3 -m unittest tests.test_routerkit_devices -v
          python3 -m unittest tests.test_routerkit_devices_cli -v
          python3 -m unittest tests.test_routerkit_device_adapters -v
          python3 -m unittest tests.test_routerkit_device_probe -v
          python3 -m unittest tests.test_routerkit_setup_devices -v

      - name: Focused autostart tests
        run: |
          python3 -m unittest tests.test_routerkit_autostart -v
          python3 -m unittest tests.test_routerkit_autostart_signals -v
          python3 -m unittest tests.test_routerkit_s23xray_direct -v
          python3 -m unittest tests.test_routerkit_setup_autostart -v

      - name: Python tests
        run: |
          python3 -m unittest discover -s tests -v

      - name: Forbidden file guard
        run: |
          set -eu
          found="$(find . -path ./.git -prune -o -type f \( \
            -name '*.cfg' -o \
            -name '*.tar.gz' -o \
            -name 'final-netcraze-xray-*' -o \
            -name 'netcraze-hopper4g-final-*' -o \
            -path './opt/etc/xray/*' -o \
            -name 'profiles.json' \
          \) -print)"
          if [ -n "$found" ]; then
            echo "Forbidden backup/config/profile files found:"
            printf '%s\n' "$found"
            exit 1
          fi

      - name: Secret guard
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          import sys

          root = Path(".")
          skip_dirs = {".git", "__pycache__"}
          skip_suffixes = {".pyc", ".zip", ".tar.gz", ".tgz"}

          private_host_pattern = r"link" + r"\.vertpath"
          private_api_pattern = "frost" + "-api"
          vless_scheme = "vless" + "://"

          patterns = [
              ("private subscription hostname", re.compile(private_host_pattern + "|" + private_api_pattern, re.I)),
              ("real VLESS URL", re.compile(re.escape(vless_scheme) + r"[^\s\"'<>]*@", re.I)),
              ("Reality key query parameter", re.compile(r"(?:[?&#]|\b)(?:pbk|sid)=[A-Za-z0-9_-]{2,}", re.I)),
              ("UUID-like value", re.compile(r"\b[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}\b")),
          ]

          def should_skip(path: Path) -> bool:
              if any(part in skip_dirs for part in path.parts):
                  return True
              text = str(path)
              return any(text.endswith(suffix) for suffix in skip_suffixes)

          def mask(value: str) -> str:
              value = value.strip()
              if len(value) <= 12:
                  return value[:3] + "..."
              return value[:6] + "..." + value[-4:]

          findings = []
          for path in sorted(p for p in root.rglob("*") if p.is_file() and not should_skip(p)):
              try:
                  text = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  text = path.read_text(encoding="utf-8", errors="replace")
              for lineno, line in enumerate(text.splitlines(), 1):
                  for label, pattern in patterns:
                      for match in pattern.finditer(line):
                          findings.append((path, lineno, label, mask(match.group(0))))

          if findings:
              print("Potential public secret exposure found:")
              for path, lineno, label, masked in findings:
                  print(f"{path}:{lineno}: {label}: {masked}")
              sys.exit(1)

          print("Secret guard passed.")
          PY

      - name: Device fixture guard
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import ipaddress
          import re
          import sys

          allowed_v4 = [
              ipaddress.ip_network("192.0.2.0/24"),
              ipaddress.ip_network("198.51.100.0/24"),
              ipaddress.ip_network("203.0.113.0/24"),
          ]
          allowed_v6 = [ipaddress.ip_network("2001:db8::/32")]
          roots = [Path("tests/fixtures/devices")]
          ip_pattern = re.compile(r"\b(?:\d{1,3}\.){3}\d{1,3}\b|2001:db8:[0-9a-fA-F:]*")
          mac_pattern = re.compile(r"\b([0-9a-fA-F]{2})(?::[0-9a-fA-F]{2}){5}\b")

          findings = []
          for root in roots:
              for path in sorted(root.rglob("*")):
                  if not path.is_file():
                      continue
                  text = path.read_text(encoding="utf-8")
                  for match in ip_pattern.finditer(text):
                      value = match.group(0)
                      try:
                          address = ipaddress.ip_address(value)
                      except ValueError:
                          continue
                      networks = allowed_v4 if address.version == 4 else allowed_v6
                      if not any(address in network for network in networks):
                          findings.append(f"{path}: non-documentation address {value}")
                  for match in mac_pattern.finditer(text):
                      first = int(match.group(1), 16)
                      if first & 0x01 or not first & 0x02:
                          findings.append(f"{path}: MAC is not unicast locally administered")

          if findings:
              print("Device fixture guard failed:")
              print("\n".join(findings))
              sys.exit(1)
          print("Device fixture guard passed.")
          PY

  address-policy:
    name: Address policy (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Destination and artifact policy tests
        run: |
          python -m unittest tests.test_routerkit_profile_network.DestinationPolicyTests -v
          python -m unittest tests.test_routerkit_artifact_network -v
