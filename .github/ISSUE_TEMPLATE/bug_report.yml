name: Bug report
description: Report a reproducible problem with the routerkit
title: "Bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not paste subscription URLs, VLESS links, UUIDs, Reality keys, router backups, or generated Xray configs.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety checklist
      options:
        - label: I removed all secrets, subscription URLs, keys, IPs, MACs, and router backups.
          required: true
        - label: I did not paste generated production Xray configs.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
      placeholder: Describe the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Router model, firmware family, Entware status, Xray version. Keep values generic if needed.
      placeholder: |
        Router: Netcraze/Keenetic-style
        Entware: installed on USB
        Xray: /opt/sbin/xray
    validations:
      required: false
  - type: textarea
    id: healthcheck
    attributes:
      label: Healthcheck output
      description: Paste sanitized output from scripts/healthcheck.sh.
      render: text
    validations:
      required: false
